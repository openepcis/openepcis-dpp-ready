name: Verify diagrams

# D2 is the single source of truth for diagrams in this repo. Every
# tools/vocab-sync/docs/diagrams/*.d2 is compiled to committed light + dark
# SVGs. This job recompiles them and fails if the committed SVGs are stale,
# so a .d2 edit can never land without its regenerated SVGs.

on:
  push:
    branches: [main]
    paths:
      - 'tools/vocab-sync/docs/diagrams/**'
      - 'scripts/build-diagrams.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/diagrams.yml'
  pull_request:
    paths:
      - 'tools/vocab-sync/docs/diagrams/**'
      - 'scripts/build-diagrams.ts'
  workflow_dispatch:

jobs:
  verify-diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install d2 (pinned — must match the version that produced the committed SVGs)
        run: |
          D2_VERSION=0.7.1
          curl -fsSL "https://github.com/terrastruct/d2/releases/download/v${D2_VERSION}/d2-v${D2_VERSION}-linux-amd64.tar.gz" -o /tmp/d2.tar.gz
          tar -C /tmp -xzf /tmp/d2.tar.gz
          sudo install "/tmp/d2-v${D2_VERSION}/bin/d2" /usr/local/bin/d2
          d2 --version
      - name: Recompile diagrams from .d2 sources
        run: pnpm run diagrams:build
      - name: Fail if committed SVGs are stale
        run: |
          if ! git diff --exit-code -- tools/vocab-sync/docs/diagrams; then
            echo "::error::Committed SVGs are out of date. Run 'pnpm run diagrams:build' and commit the result."
            exit 1
          fi

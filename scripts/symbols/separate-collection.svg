<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140" role="img" aria-label="Separate collection - do not dispose in household waste">
  <rect width="120" height="140" fill="#ffffff"/>
  <g fill="none" stroke="#111111" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <!-- wheelie bin body -->
    <path d="M34 46 h52 l-6 74 h-40 z"/>
    <!-- lid -->
    <path d="M30 46 h60"/>
    <path d="M50 46 v-8 a4 4 0 0 1 4-4 h12 a4 4 0 0 1 4 4 v8"/>
    <!-- ribs -->
    <path d="M48 58 l-3 50 M60 58 v50 M72 58 l3 50"/>
    <!-- wheels -->
    <circle cx="46" cy="128" r="4" fill="#111111" stroke="none"/>
    <circle cx="74" cy="128" r="4" fill="#111111" stroke="none"/>
  </g>
  <!-- cross-out bar -->
  <line x1="20" y1="122" x2="100" y2="30" stroke="#111111" stroke-width="7" stroke-linecap="round"/>
</svg>

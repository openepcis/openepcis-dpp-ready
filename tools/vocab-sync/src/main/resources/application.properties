# ── vocab-sync ─────────────────────────────────────────────────────────────
# A picocli CLI, not a server. Quiet startup; the LLM provider is only contacted
# when a command actually grades/embeds, so the app starts even if the endpoint
# is down (a smoke/audit run then reports the connection error).

quarkus.banner.enabled=false
quarkus.log.level=WARN
quarkus.log.category."io.openepcis".level=INFO

# ── LLM provider (OpenAI-compatible, portable) ───────────────────────────────
# Default = LM Studio on this Mac. Repoint anywhere by exporting the env vars:
#   LLM_BASE_URL   e.g. http://localhost:11434/v1 (Ollama), https://api.openai.com/v1
#   LLM_CHAT_MODEL / LLM_EMBED_MODEL  swap for the target endpoint's model ids
quarkus.langchain4j.openai.base-url=${LLM_BASE_URL:http://localhost:1234/v1}
quarkus.langchain4j.openai.api-key=${LLM_API_KEY:lm-studio}
quarkus.langchain4j.openai.timeout=180s
quarkus.langchain4j.openai.chat-model.model-name=${LLM_CHAT_MODEL:openai/gpt-oss-20b}
quarkus.langchain4j.openai.chat-model.temperature=0
# gpt-oss reasons by default; the grading task does not benefit from it (benchmark) and a long
# reasoning chain dominates latency (7.5s→3.8s on a T4 at 'low'). Applies to any reasoning-capable
# bulk model; ignored by models/servers that don't support it.
quarkus.langchain4j.openai.chat-model.reasoning-effort=${LLM_REASONING_EFFORT:low}
quarkus.langchain4j.openai.embedding-model.model-name=${LLM_EMBED_MODEL:text-embedding-nomic-embed-text-v1.5}

# Flip to true to see the raw HTTP to the model endpoint while debugging.
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.log-responses=false

# ── QA verifier (second tier) ────────────────────────────────────────────────
# A separate, stronger model re-judges each finding at the END of an audit before
# it is reported as confirmed. Defaults to the local flagship; point it at Claude
# Opus by exporting QA_BASE_URL/QA_CHAT_MODEL/QA_API_KEY, e.g.:
#   QA_BASE_URL=https://api.anthropic.com/v1/   (Anthropic OpenAI-compatible)
#   QA_CHAT_MODEL=claude-opus-4-8
#   QA_API_KEY=sk-ant-…
quarkus.langchain4j.openai.qa.base-url=${QA_BASE_URL:${LLM_BASE_URL:http://localhost:1234/v1}}
quarkus.langchain4j.openai.qa.api-key=${QA_API_KEY:${LLM_API_KEY:lm-studio}}
quarkus.langchain4j.openai.qa.timeout=300s
quarkus.langchain4j.openai.qa.chat-model.model-name=${QA_CHAT_MODEL:qwen3.5-122b-a10b}
quarkus.langchain4j.openai.qa.chat-model.temperature=0
# Low reasoning for a gpt-oss QA panel (fast); a no-op for non-gpt-oss QA models (e.g. qwen3-32b).
quarkus.langchain4j.openai.qa.chat-model.reasoning-effort=${QA_REASONING_EFFORT:low}

# ── Input paths (repo-relative defaults; the CLI resolves against --repo-root) ─
# Upstream cached vocabularies and local checkouts. Override per-host as needed.
vocab-sync.repo-root=${VOCAB_REPO_ROOT:../..}
vocab-sync.cache.gs1=${VOCAB_GS1_TTL:.cache/vocab/gs1-voc.ttl}
vocab-sync.cache.schemaorg=${VOCAB_SCHEMAORG_TTL:.cache/vocab/schemaorg.ttl}
# SEMICeu (RDF jsonld), DPP Keystone + UNTP (JSON-LD @context) upstream sources.
vocab-sync.semic-dir=${VOCAB_SEMIC_DIR:.cache/vocab}
vocab-sync.dppk-dir=${VOCAB_DPPK_DIR:.cache/vocab/dppk}
vocab-sync.dppk-namespace=${VOCAB_DPPK_NS:https://dpp-keystone.org/spec/v2/terms#}
# UNTP discovery source = the REAL canonical 0.7.0 context (terms minted flat under …/untp/, no
# version segment); the bridge context is kept only for its JSON-LD oec:-alias role, not indexing.
vocab-sync.untp-context=${VOCAB_UNTP_CONTEXT:extensions/common/interop/context/untp-0.7.0-context.jsonld}
vocab-sync.untp-namespace=${VOCAB_UNTP_NS:https://vocabulary.uncefact.org/untp/}
# GS1 Rail vocabulary — in-repo mirror (Layer-1 sectoral peer), indexed as a discovery source.
vocab-sync.rail-voc=${VOCAB_RAIL_VOC:extensions/upstream/gs1-rail/ontology/gs1RailVoc.ttl}
vocab-sync.dppkeystone-root=${DPPKEYSTONE_ROOT:${user.home}/Documents/projects/DPPKeystoneOrg}
vocab-sync.batterypass-root=${BATTERYPASS_ROOT:${user.home}/Documents/projects/BatteryPassDataModel}

# ── Upstream source URLs (for `fetch --all` / `sync` auto-refresh) ────────────
# Each refreshable upstream maps to its cached file (above) plus a canonical download URL.
# An empty URL means "no remote source configured" → that vocab is skipped by the refresh
# (e.g. the GS1 Turtle and SEMICeu JSON-LD URLs vary by host; set them per-environment).
# schema.org publishes a stable latest-version Turtle, so it has a working default.
# All canonical and verified to match the cache. GS1 is on ref.gs1.org (www.gs1.org 403s).
# ADMS/LOCN serve Turtle (W3C) and are re-serialized to the cache's JSON-LD on save.
vocab-sync.source.schemaorg.url=${VOCAB_SRC_SCHEMAORG:https://schema.org/version/latest/schemaorg-current-https.ttl}
vocab-sync.source.gs1.url=${VOCAB_SRC_GS1:https://ref.gs1.org/voc/data/gs1Voc.ttl}
# m8g: the data.europa.eu PURL resolves (via http⇄https hops) to this SEMICeu release Turtle;
# point straight at it so the temp file's extension matches the body (Turtle), then convert on save.
vocab-sync.source.semic-m8g.url=${VOCAB_SRC_SEMIC_M8G:https://SEMICeu.github.io/uri.semic.eu-puris/releases/m8g/m8g.ttl}
vocab-sync.source.semic-adms.url=${VOCAB_SRC_SEMIC_ADMS:https://www.w3.org/ns/adms.ttl}
vocab-sync.source.semic-locn.url=${VOCAB_SRC_SEMIC_LOCN:https://www.w3.org/ns/locn.ttl}

# ── Retrieval / grading knobs ─────────────────────────────────────────────────
vocab-sync.embeddings.cache=${VOCAB_EMBED_CACHE:tools/vocab-sync/.cache/embeddings.json}
vocab-sync.verdicts.cache=${VOCAB_VERDICT_CACHE:tools/vocab-sync/.cache/verdicts.json}
vocab-sync.retrieve.top-k=8
vocab-sync.grade.min-confidence=0.55
